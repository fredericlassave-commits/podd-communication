<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PODD Tablette - Version Stable</title>
    <style>
        /* CSS intégré pour éviter les fichiers séparés */
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; padding: 10px; touch-action: manipulation; }
        .grid-page { display: block; width: 100%; overflow: hidden; }
        .btn { 
            float: left; width: 30%; height: 130px; margin: 1.5%; 
            background: white; border: 4px solid #a0aec0; border-radius: 12px;
            box-sizing: border-box; font-size: 16px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .emoji { font-size: 45px; display: block; margin-bottom: 5px; }
        .btn-text { display: block; text-transform: uppercase; }
        .back-btn { background: #edf2f7; border-color: #4a5568; width: 97%; height: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="app-container"></div>

    <script>
        // --- TES DONNÉES (Colle ton contenu de config.js ici) ---
        var CONFIG_PODD = {
            "home": {
                "titre": "Accueil",
                "boutons": [
                    { "label": "MANGER", "emoji": "🍎", "son": "Je veux manger" },
                    { "label": "BOIRE", "emoji": "🥤", "son": "J'ai soif" },
                    { "label": "TOILETTE", "emoji": "🚽", "son": "Je veux aller aux toilettes" },
                    { "label": "JOUER", "emoji": "🧸", "page": "page_jeux" }
                ]
            },
            "page_jeux": {
                "titre": "Jeux",
                "boutons": [
                    { "label": "BALLON", "emoji": "⚽", "son": "Je veux jouer au ballon" },
                    { "label": "DESSINER", "emoji": "🎨", "son": "Je veux dessiner" }
                ]
            }
        };

        // --- LOGIQUE DE NAVIGATION (Version simplifiée pour Android 5) ---
        var container = document.getElementById('app-container');

        function parler(texte) {
            if (!texte) return;
            window.speechSynthesis.cancel();
            var msg = new SpeechSynthesisUtterance(texte);
            msg.lang = 'fr-FR';
            window.speechSynthesis.speak(msg);
        }

        function renderPage(pageKey) {
            var data = CONFIG_PODD[pageKey];
            if (!data) return;
            container.innerHTML = "";
            var grid = document.createElement('div');
            grid.className = 'grid-page';

            if (pageKey !== 'home') {
                var back = document.createElement('button');
                back.className = 'btn back-btn';
                back.innerHTML = '⬅️ RETOUR';
                back.onclick = function() { renderPage('home'); };
                grid.appendChild(back);
            }

            for (var i = 0; i < data.boutons.length; i++) {
                (function() {
                    var b = data.boutons[i];
                    var btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.style.borderColor = b.couleur || "#a0aec0";
                    btn.onclick = function() {
                        if (b.page) renderPage(b.page);
                        else if (b.son) parler(b.son);
                    };
                    btn.innerHTML = '<span class="emoji">' + (b.emoji || "") + '</span>' +
                                    '<span class="btn-text">' + b.label + '</span>';
                    grid.appendChild(btn);
                })();
            }
            container.appendChild(grid);
        }

        window.onload = function() { renderPage('home'); };
    </script>
</body>
</html>
