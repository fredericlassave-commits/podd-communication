<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PODD Tablette - Version Sonore Stable</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; padding: 10px; touch-action: manipulation; }
        #app-container { display: block; width: 100%; }
        
        /* Style des boutons */
        .grid-page { display: block; width: 100%; overflow: hidden; }
        .btn { 
            float: left; width: 30%; height: 140px; margin: 1.5%; 
            background: white; border: 4px solid #a0aec0; border-radius: 15px;
            box-sizing: border-box; font-size: 18px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .emoji { font-size: 50px; display: block; margin-bottom: 5px; }
        
        /* Bouton Spécial pour activer le son au démarrage */
        #unlock-audio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; text-align: center; border: none;
        }
        
        .back-btn { background: #edf2f7; border-color: #4a5568; width: 97%; height: 60px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Ce bouton disparaîtra après le premier clic pour "réveiller" le son -->
    <button id="unlock-audio" onclick="activerLeSon()">
        CLIQUEZ ICI POUR <br> ACTIVER LE SON
    </button>

    <div id="app-container"></div>

    <script>
        // --- TES DONNÉES PODD ---
        var CONFIG_PODD = {
            "home": {
                "boutons": [
                    { "label": "MANGER", "emoji": "🍎", "son": "Je veux manger" },
                    { "label": "BOIRE", "emoji": "🥤", "son": "J'ai soif" },
                    { "label": "JOUER", "emoji": "🧸", "page": "page_jeux" },
                    { "label": "TOILETTE", "emoji": "🚽", "son": "Besoin d'aller aux toilettes" }
                ]
            },
            "page_jeux": {
                "boutons": [
                    { "label": "BALLON", "emoji": "⚽", "son": "On joue au ballon ?" },
                    { "label": "DESSIN", "emoji": "🎨", "son": "Je veux dessiner" }
                ]
            }
        };

        var synthese = window.speechSynthesis;

        // Fonction pour débloquer le moteur audio d'Android 5
        function activerLeSon() {
            var msg = new SpeechSynthesisUtterance(' '); // On lance un son vide
            synthese.speak(msg);
            document.getElementById('unlock-audio').style.display = 'none';
            renderPage('home');
        }

        function parler(texte) {
            if (!texte) return;
            synthese.cancel(); // Stoppe toute parole en cours
            
            var msg = new SpeechSynthesisUtterance(texte);
            msg.lang = 'fr-FR';
            msg.volume = 1.0;
            msg.rate = 0.9; // Légèrement plus lent pour plus de clarté
            
            // Petit délai pour assurer que le moteur est prêt
            setTimeout(function() {
                synthese.speak(msg);
            }, 100);
        }

        function renderPage(pageKey) {
            var container = document.getElementById('app-container');
            var data = CONFIG_PODD[pageKey];
            if (!data) return;

            container.innerHTML = "";
            var grid = document.createElement('div');
            grid.className = 'grid-page';

            // Bouton retour
            if (pageKey !== 'home') {
                var back = document.createElement('button');
                back.className = 'btn back-btn';
                back.innerHTML = '⬅️ RETOUR';
                back.onclick = function() { renderPage('home'); };
                grid.appendChild(back);
            }

            // Génération des boutons
            for (var i = 0; i < data.boutons.length; i++) {
                (function() {
                    var b = data.boutons[i];
                    var btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerHTML = '<span class="emoji">' + (b.emoji || "") + '</span>' + 
                                    '<span class="text">' + b.label + '</span>';
                    
                    btn.onclick = function() {
                        if (b.page) renderPage(b.page);
                        else if (b.son) parler(b.son);
                    };
                    grid.appendChild(btn);
                })();
            }
            container.appendChild(grid);
        }
    </script>
</body>
</html>
