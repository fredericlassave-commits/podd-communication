<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST FINAL</title>
    <style>
        body { background: #f0f0f0; font-family: sans-serif; text-align: center; }
        .grid { display: block; width: 100%; }
        .btn { 
            width: 30%; height: 150px; margin: 1%; 
            background: white; border: 4px solid #000; 
            float: left; font-size: 20px; font-weight: bold;
        }
        .emoji { display: block; font-size: 50px; }
    </style>
</head>
<body>
    <h1>SI TU VOIS CE TITRE, CA MARCHE</h1>
    <div id="box"></div>

    <script>
        // Version ultra-simplifiée pour test immédiat
        var container = document.getElementById('box');
        var boutons = [
            {label: "MANGER", emoji: "🍎"},
            {label: "BOIRE", emoji: "🥤"},
            {label: "STOP", emoji: "✋"}
        ];

        for (var i = 0; i < boutons.length; i++) {
            var b = boutons[i];
            var btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = '<span class="emoji">' + b.emoji + '</span>' + b.label;
            btn.onclick = function() { alert("Clic OK"); };
            container.appendChild(btn);
        }
    </script>
</body>
</html>
